<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparador de Documentos</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Comparador de Documentos</h1>
      <p>Sube 2 o más PDFs para comparar su contenido y analizar diferencias con IA</p>
    </header>

    <section class="upload-section">
      <div id="uploadSlots" class="upload-slots"></div>

      <div class="upload-actions">
        <button id="addDocBtn" class="btn-secondary">+ Agregar documento</button>
        <button id="compareBtn" class="btn-primary" disabled>Comparar documentos</button>
      </div>
    </section>

    <section id="loading" class="hidden">
      <div class="spinner"></div>
      <p>Comparando documentos y analizando con IA...</p>
    </section>

    <section id="results" class="hidden">
      <div class="summary-bar" id="summaryBar"></div>

      <div class="tabs">
        <button class="tab active" data-tab="items">Items</button>
        <button class="tab" data-tab="ia">Análisis IA</button>
      </div>

      <div id="tabItems" class="tab-content active">
        <div class="items-summary" id="itemsSummary"></div>
        <div class="export-bar" id="exportBar" style="display:none">
          <button class="btn-export" id="exportCsvBtn">📄 Exportar CSV</button>
          <button class="btn-export" id="exportXlsxBtn">📊 Exportar Excel</button>
        </div>
        <div class="items-table-wrapper" id="itemsTableWrapper"></div>
      </div>

      <div id="tabIA" class="tab-content">
        <div id="iaContainer" class="ia-container"></div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
